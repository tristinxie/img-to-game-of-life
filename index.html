<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>img2gol</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <h1>Image to Conway's Game of Life</h1>
    <div id="canvasParent">
      <canvas id="canvas" width="750" height="500"></canvas>
    </div>
    <div id="controls">
      <button id="clear" title="Clear the grid">Clear</button>
      <button id="playPause" title="Play the simulation">▶</button>
      <button id="step" title="Step forward one generation">→</button>
      <input id="speed" type="range" min="1" max="144" value="15">
      <div id="speedValue">
        15
      </div>
    </div>
    <input type="file" id="image" name="image" accept="image/png, image/jpeg">
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
